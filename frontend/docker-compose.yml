version: '3'

services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:5111
    depends_on:
      - backend
    networks:
      - quant-tool

  backend:
    # 后端服务配置（示例）
    image: python:3.11
    command: python app.py
    ports:
      - "5111:5111"
    volumes:
      - ../:/app
    working_dir: /app
    networks:
      - quant-tool

networks:
  quant-tool:
    driver: bridge
